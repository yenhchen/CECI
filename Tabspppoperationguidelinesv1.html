<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>機關辦理民參案件之資訊蒐集及獎勵金核發指南</title>
    
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- 引入 React 與 ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    
    <!-- 引入 Babel 讓瀏覽器可以編譯 JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <!-- React 應用程式的掛載點 -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // --- 自定義圖示組件 (確保純 HTML 完美運作) ---
        const IconWrapper = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );

        const Clock = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></IconWrapper>;
        const CalendarDays = (props) => <IconWrapper {...props}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></IconWrapper>;
        const Globe = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></IconWrapper>;
        const FileText = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><line x1="10" y1="9" x2="8" y2="9"/></IconWrapper>;
        const AlertTriangle = (props) => <IconWrapper {...props}><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></IconWrapper>;
        const CheckCircle2 = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></IconWrapper>;
        const Info = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></IconWrapper>;
        const FileCheck = (props) => <IconWrapper {...props}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="m9 15 2 2 4-4"/></IconWrapper>;
        const Building = (props) => <IconWrapper {...props}><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><path d="M9 22v-4h6v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M12 6h.01"/><path d="M12 10h.01"/><path d="M12 14h.01"/><path d="M16 10h.01"/><path d="M16 14h.01"/><path d="M8 10h.01"/><path d="M8 14h.01"/></IconWrapper>;
        const Flag = (props) => <IconWrapper {...props}><path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><line x1="4" y1="22" x2="4" y2="15"/></IconWrapper>;
        
        // 新增獎勵金相關 Icon
        const Award = (props) => <IconWrapper {...props}><circle cx="12" cy="8" r="7"/><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"/></IconWrapper>;
        const XCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></IconWrapper>;
        const ArrowDownCircle = (props) => <IconWrapper {...props}><circle cx="12" cy="12" r="10"/><polyline points="8 12 12 16 16 12"/><line x1="12" y1="8" x2="12" y2="16"/></IconWrapper>;
        const Scale = (props) => <IconWrapper {...props}><path d="M16 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><path d="M2 16l3-8 3 8c-.87.65-1.92 1-3 1s-2.13-.35-3-1Z"/><line x1="7" y1="8" x2="7" y2="4"/><line x1="11" y1="4" x2="17" y2="4"/><line x1="17" y1="8" x2="17" y2="4"/><line x1="12" y1="4" x2="12" y2="20"/></IconWrapper>;

        const App = () => {
            const [activeTab, setActiveTab] = useState('stage1');

            const Badge = ({ children, color = "blue" }) => {
                const colorClasses = {
                    blue: "bg-blue-100 text-blue-800 border-blue-200",
                    red: "bg-red-100 text-red-800 border-red-200",
                    amber: "bg-amber-100 text-amber-800 border-amber-200",
                    emerald: "bg-emerald-100 text-emerald-800 border-emerald-200",
                    purple: "bg-purple-100 text-purple-800 border-purple-200",
                    gray: "bg-gray-100 text-gray-800 border-gray-200"
                };
                return (
                    <span className={`inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium border ${colorClasses[color]} ml-2`}>
                        {children}
                    </span>
                );
            };

            const Card = ({ title, icon: Icon, children, stageNum, className="" }) => (
                <div className={`bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all hover:shadow-md relative animate-[fadeIn_0.3s_ease-in-out] ${className}`}>
                    <div className="absolute top-0 left-0 w-1.5 h-full bg-blue-600"></div>
                    <div className="p-5 border-b border-gray-100 bg-gray-50/50 flex items-center justify-between">
                        <div className="flex items-center space-x-3">
                            <div className="p-2 bg-blue-100 text-blue-700 rounded-lg">
                                <Icon size={24} />
                            </div>
                            <h2 className="text-xl font-bold text-gray-800 flex items-center">
                                {stageNum && <span className="text-blue-600 mr-2"> </span>}
                                {title}
                            </h2>
                        </div>
                    </div>
                    <div className="p-6">
                        {children}
                    </div>
                </div>
            );

            // 定義所有頁籤資料
            const tabs = [
                { id: 'stage1', label: '前置作業階段', icon: Building, stageNum: '1' },
                { id: 'stage2', label: '簽約階段', icon: FileCheck, stageNum: '2' },
                { id: 'stage3', label: '履約階段', icon: FileText, stageNum: '3' },
                { id: 'stage4', label: '資訊登載注意事項', icon: Info, stageNum: null },
                { id: 'stage5', label: '獎勵金', icon: Award, stageNum: null }
            ];

            return (
                <div className="min-h-screen bg-slate-50 p-6 md:p-8 font-sans">
                    <style>
                        {`
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(5px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        `}
                    </style>
                    <div className="max-w-5xl mx-auto">
                        
                        {/* Header 包含灰色斜體副標題 */}
                        <header className="mb-6 pb-6 border-b border-slate-200">
                            <div className="flex items-start md:items-center">
                                <Flag className="text-blue-600 mr-3 shrink-0 mt-1 md:mt-0" size={32} />
                                <div>
                                    <h1 className="text-2xl md:text-3xl font-extrabold text-slate-900 tracking-tight">
                                        機關辦理民參案件之資訊蒐集及獎勵金核發指南
                                    </h1>
                                    <p className="text-slate-500 italic mt-1.5 text-sm md:text-base">
                                        依據「機關辦理民間參與公共建設案件資訊蒐集及獎勵金核發作業要點」
                                    </p>
                                </div>
                            </div>
                        </header>

                        {/* Tabs Navigation (修改這裡：增加 flex-wrap 與 gap-2，移除溢出隱藏相關 class) */}
                        <div className="flex flex-wrap gap-2 border-b border-slate-200 mb-6 pb-2">
                            {tabs.map((tab) => (
                                <button
                                    key={tab.id}
                                    onClick={() => setActiveTab(tab.id)}
                                    className={`flex items-center px-4 py-3 text-sm md:text-base font-medium rounded-lg whitespace-nowrap transition-all duration-200 ease-in-out border ${
                                        activeTab === tab.id
                                            ? 'bg-blue-50 text-blue-700 border-blue-200 shadow-sm'
                                            : 'text-slate-500 border-transparent bg-white/50 hover:text-slate-700 hover:bg-slate-100 hover:border-slate-200'
                                    }`}
                                >
                                    <tab.icon className={`mr-2 h-5 w-5 ${activeTab === tab.id ? 'text-blue-600' : 'text-slate-400'}`} />
                                    {tab.label}
                                </button>
                            ))}
                        </div>

                        {/* Tab Content Area */}
                        <div className="space-y-8 animate-[fadeIn_0.3s_ease-in-out]">
                            
                            {/* Stage 1 */}
                            {activeTab === 'stage1' && (
                                <Card title="前置作業階段" icon={Building} stageNum="1">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-6">
                                            <div className="bg-blue-50/50 rounded-lg p-4 border border-blue-100">
                                                <h3 className="font-bold text-blue-900 flex items-center mb-3">
                                                    <Clock className="mr-2 h-5 w-5" />
                                                    資訊蒐集 (§4)
                                                    <Badge color="red">次日起 30 日內</Badge>
                                                </h3>
                                                <p className="text-sm text-slate-600 mb-3">各類案件須於起算日之次日起30日內，於促參資訊網登載基本資訊。</p>
                                                <ul className="space-y-2 text-sm">
                                                    <li className="flex items-start">
                                                        <CheckCircle2 className="h-4 w-4 text-blue-500 mr-2 mt-0.5 shrink-0" />
                                                        <span><strong>政府規劃：</strong>預評估結果可行，且經機關書面核准日起算。</span>
                                                    </li>
                                                    <li className="flex items-start">
                                                        <CheckCircle2 className="h-4 w-4 text-blue-500 mr-2 mt-0.5 shrink-0" />
                                                        <span><strong>民間自行規劃：</strong>機關核准辦理政策公告日起算。</span>
                                                    </li>
                                                    <li className="flex items-start">
                                                        <CheckCircle2 className="h-4 w-4 text-blue-500 mr-2 mt-0.5 shrink-0" />
                                                        <span><strong>優先訂約：</strong>機關核准與民間機構辦理優先定約之日起算。</span>
                                                    </li>
                                                    <li className="flex items-start">
                                                        <CheckCircle2 className="h-4 w-4 text-blue-500 mr-2 mt-0.5 shrink-0" />
                                                        <span><strong>其他法令案件：</strong>機關核准依該法令辦理公告或公開日起算。</span>
                                                    </li>
                                                </ul>
                                            </div>

                                            <div className="bg-amber-50/50 rounded-lg p-4 border border-amber-100">
                                                <h3 className="font-bold text-amber-900 flex items-center mb-3">
                                                    <CalendarDays className="mr-2 h-5 w-5" />
                                                    定期回報機制 (§4)
                                                </h3>
                                                <p className="text-sm text-slate-700">機關應登載前一季的辦理情形，期限為每年：</p>
                                                <div className="flex flex-wrap gap-2 mt-3">
                                                    <Badge color="amber">1月底前</Badge>
                                                    <Badge color="amber">4月底前</Badge>
                                                    <Badge color="amber">7月底前</Badge>
                                                    <Badge color="amber">10月底前</Badge>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="space-y-6">
                                            <div className="bg-purple-50/50 rounded-lg p-4 border border-purple-100 h-full">
                                                <h3 className="font-bold text-purple-900 flex items-center mb-3">
                                                    <Globe className="mr-2 h-5 w-5" />
                                                    英文資訊登載 (§5)
                                                </h3>
                                                <p className="text-sm text-slate-700 mb-3">若符合以下任一情形，應**同時**登載英文資訊：</p>
                                                <ul className="space-y-3 text-sm">
                                                    <li className="flex items-start bg-white p-2 rounded border border-purple-100">
                                                        <span className="bg-purple-200 text-purple-800 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold mr-2 shrink-0">1</span>
                                                        <span>促參法第 3 條第 2 項所定之<strong>重大公共建設</strong>。</span>
                                                    </li>
                                                    <li className="flex items-start bg-white p-2 rounded border border-purple-100">
                                                        <span className="bg-purple-200 text-purple-800 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold mr-2 shrink-0">2</span>
                                                        <span>促參法第 8 條第 1 項各款興建營運<strong>涉政府預算</strong>。</span>
                                                    </li>
                                                    <li className="flex items-start bg-white p-2 rounded border border-purple-100">
                                                        <span className="bg-purple-200 text-purple-800 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold mr-2 shrink-0">3</span>
                                                        <span>適用<strong>條約或協定</strong>者。</span>
                                                    </li>
                                                    <li className="flex items-start bg-white p-2 rounded border border-purple-100">
                                                        <span className="bg-purple-200 text-purple-800 rounded-full w-5 h-5 flex items-center justify-center text-xs font-bold mr-2 shrink-0">4</span>
                                                        <span>依機關辦理促進民間參與公共建設案件前置作業費用補助作業要點，<strong>受財政部補助</strong>前置作業費用者。</span>
                                                    </li>
                                                </ul>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            )}

                            {/* Stage 2 */}
                            {activeTab === 'stage2' && (
                                <Card title="簽約階段 (辦理民投金額認定)" icon={FileCheck} stageNum="2">
                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                        <div className="md:col-span-1 bg-red-50/50 rounded-lg p-4 border border-red-100 flex flex-col justify-center items-center text-center">
                                            <Clock className="h-10 w-10 text-red-500 mb-2" />
                                            <h3 className="font-bold text-red-900 mb-1">辦理期限 (§6)</h3>
                                            <p className="text-sm text-red-700">簽訂民參案件契約之</p>
                                            <div className="text-xl font-black text-red-600 my-2">次日起 30 日內</div>
                                            <p className="text-sm text-red-700">須提出民投金額認定</p>
                                        </div>

                                        <div className="md:col-span-2 space-y-4">
                                            <div className="bg-emerald-50/50 rounded-lg p-4 border border-emerald-100">
                                                <h3 className="font-bold text-emerald-900 flex items-center mb-2">
                                                    <FileText className="mr-2 h-5 w-5" />
                                                    應檢送資料
                                                </h3>
                                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mt-3">
                                                    <div className="bg-white p-3 rounded border border-emerald-200">
                                                        <div className="text-xs font-bold text-emerald-600 mb-1">促參案件</div>
                                                        <ul className="text-sm space-y-1 text-slate-700 list-disc list-inside marker:text-emerald-400">
                                                            <li>投資契約</li>
                                                            <li>投資執行計畫書</li>
                                                            <li>民投金額試算表等資料</li>
                                                        </ul>
                                                    </div>
                                                    <div className="bg-white p-3 rounded border border-emerald-200">
                                                        <div className="text-xs font-bold text-emerald-600 mb-1">其他法令案件</div>
                                                        <ul className="text-sm space-y-1 text-slate-700 list-disc list-inside marker:text-emerald-400">
                                                            <li>契約書</li>
                                                            <li>可檢視其投資金額與期程之資料</li>
                                                            <li>民投金額試算表等資料</li>
                                                        </ul>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="bg-gray-100 rounded-lg p-4 flex items-start">
                                                <AlertTriangle className="h-5 w-5 text-amber-500 mr-3 shrink-0 mt-0.5" />
                                                <div>
                                                    <h4 className="text-sm font-bold text-gray-800">展延機制</h4>
                                                    <p className="text-sm text-gray-600 mt-1">
                                                        若未能於期限內提出，應備具緣由函報財政部申請展延。<br/>
                                                        <Badge color="amber">展延以 1 次為限</Badge>
                                                        <Badge color="amber">以 15 日為上限</Badge>
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            )}

                            {/* Stage 3 */}
                            {activeTab === 'stage3' && (
                                <Card title="履約階段" icon={FileText} stageNum="3">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-blue-50/50 rounded-lg p-4 border border-blue-100">
                                            <h3 className="font-bold text-blue-900 flex items-center mb-4">
                                                <Clock className="mr-2 h-5 w-5" />
                                                資訊蒐集登載期限 (§7)
                                            </h3>
                                            <div className="space-y-4">
                                                <div className="flex items-center justify-between bg-white p-3 rounded border border-blue-50">
                                                    <span className="text-sm font-medium text-slate-700">民投金額認定</span>
                                                    <Badge color="emerald">於接獲財政部民投金額認定函之次日起 10 日內</Badge>
                                                </div>
                                                <div className="flex items-center justify-between bg-white p-3 rounded border border-blue-50">
                                                    <span className="text-sm font-medium text-slate-700">營運績效評定結果 (促參)</span>
                                                    <Badge color="blue">公開於機關資訊網路之次日起 30 日內</Badge>
                                                </div>
                                                <div className="flex items-center justify-between bg-white p-3 rounded border border-blue-50">
                                                    <span className="text-sm font-medium text-slate-700">履約爭議處理結果 (促參)</span>
                                                    <Badge color="blue">結果送達之次日起 30 日內</Badge>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="bg-amber-50/50 rounded-lg p-4 border border-amber-100">
                                            <h3 className="font-bold text-amber-900 flex items-center mb-3">
                                                <CalendarDays className="mr-2 h-5 w-5" />
                                                定期回報機制 (§7)
                                            </h3>
                                            <p className="text-sm text-slate-700 mb-4">機關應於下列期限前，登載前<strong className="text-amber-700">半年</strong>的辦理情形：</p>
                                            <div className="flex gap-4">
                                                <div className="flex-1 bg-white p-4 rounded-lg border border-amber-200 text-center">
                                                    <div className="text-2xl font-black text-amber-600 mb-1">1月</div>
                                                    <div className="text-xs text-amber-800 font-medium">月底前</div>
                                                </div>
                                                <div className="flex-1 bg-white p-4 rounded-lg border border-amber-200 text-center">
                                                    <div className="text-2xl font-black text-amber-600 mb-1">7月</div>
                                                    <div className="text-xs text-amber-800 font-medium">月底前</div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            )}

                            {/* Stage 4 */}
                            {activeTab === 'stage4' && (
                                <Card title="機關完成資訊登載注意事項" icon={Info}>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="bg-slate-50 rounded-lg p-5 border border-slate-200">
                                            <h3 className="font-bold text-slate-800 flex items-center mb-4">
                                                <AlertTriangle className="mr-2 h-5 w-5 text-red-500" />
                                                重大狀態變更 (§8)
                                                <Badge color="red">發生之次日起 30 日內</Badge>
                                            </h3>
                                            <ul className="space-y-4">
                                                <li className="bg-white p-3 rounded shadow-sm border border-slate-100">
                                                    <strong className="text-blue-700 block text-sm mb-1">基本資訊變更</strong>
                                                    <p className="text-sm text-slate-600">應於期限內修正促參資訊網上的資訊。</p>
                                                </li>
                                                <li className="bg-white p-3 rounded shadow-sm border border-slate-100">
                                                    <strong className="text-red-700 block text-sm mb-1">停止辦理、契約解除或終止</strong>
                                                    <p className="text-sm text-slate-600">須備具緣由函報財政部辦理停止資訊蒐集。</p>
                                                </li>
                                            </ul>
                                        </div>

                                        <div className="bg-slate-800 rounded-lg p-5 border border-slate-700 text-slate-100">
                                            <h3 className="font-bold text-white flex items-center mb-4">
                                                <CheckCircle2 className="mr-2 h-5 w-5 text-emerald-400" />
                                                其他法令案件之停止填報
                                            </h3>
                                            <div className="space-y-3 text-sm text-slate-300">
                                                <p>
                                                    自簽約日起算<strong className="text-white text-base mx-1 bg-slate-700 px-2 py-0.5 rounded">滿三年</strong>，機關得申請停止登載進度填報。
                                                </p>
                                                <div className="flex items-start mt-2 bg-slate-700/50 p-3 rounded border border-slate-600">
                                                    <Info className="h-4 w-4 text-blue-300 mr-2 mt-0.5 shrink-0" />
                                                    <p>經財政部審核通過後即可停止。</p>
                                                </div>
                                                <div className="flex items-start bg-slate-700/50 p-3 rounded border border-slate-600 border-l-4 border-l-amber-500">
                                                    <AlertTriangle className="h-4 w-4 text-amber-500 mr-2 mt-0.5 shrink-0" />
                                                    <p className="text-amber-100">
                                                        <strong>注意：</strong>若案件涉有工程，則必須於<strong className="text-white mx-1 border-b border-white">全部工程完工後</strong>，始得申請停止填報。
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </Card>
                            )}

                            {/* Stage 5: 獎勵金 */}
                            {activeTab === 'stage5' && (
                                <div className="space-y-6">
                                    {/* 第一部分：獎勵金種類與核算機制 */}
                                    <Card title="一、 獎勵金種類與核算機制" icon={Award} className="mb-0">
                                        <div className="space-y-8">
                                            {/* 1. 簽約獎勵金 */}
                                            <div>
                                                <h3 className="text-lg font-bold text-slate-800 flex items-center mb-3 border-b pb-2">
                                                    <span className="bg-blue-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2 shrink-0">1</span>
                                                    簽約獎勵金 (§9、§10)
                                                </h3>
                                                <p className="text-sm text-slate-600 mb-4 bg-slate-100 p-3 rounded-md border border-slate-200">
                                                    <strong>定義：</strong>機關於當年度 <Badge color="amber">12 月 31 日前</Badge> 完成民參案件簽約者，由財政部核算並於次年度撥付。
                                                </p>
                                                
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6">
                                                    {/* 核算方式 */}
                                                    <div className="space-y-4">
                                                        <div className="bg-blue-50/50 rounded-lg p-4 border border-blue-100">
                                                            <div className="font-bold text-blue-900 mb-2 flex items-center">
                                                                <Scale className="w-5 h-5 mr-2" /> 促參案件核算基準
                                                            </div>
                                                            <p className="text-xs text-blue-700 mb-2">依公共建設部分民投金額，採累退百分比計算：</p>
                                                            <div className="space-y-2 text-sm">
                                                                <div className="flex justify-between items-center bg-white p-2 rounded border border-blue-50">
                                                                    <span>5,000 萬 (含) 以下</span><Badge color="blue"><strong>5%</strong></Badge>
                                                                </div>
                                                                <div className="flex justify-between items-center bg-white p-2 rounded border border-blue-50">
                                                                    <span>大於 5,000 萬 ～ 1 億 (含)</span><Badge color="blue"><strong>3%</strong></Badge>
                                                                </div>
                                                                <div className="flex justify-between items-center bg-white p-2 rounded border border-blue-50">
                                                                    <span>大於 1 億 ～ 20 億 (含)</span><Badge color="blue"><strong>2%</strong></Badge>
                                                                </div>
                                                                <div className="flex justify-between items-center bg-white p-2 rounded border border-blue-50">
                                                                    <span>大於 20 億</span><Badge color="blue"><strong>2‰</strong></Badge>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        <div className="bg-purple-50/50 rounded-lg p-4 border border-purple-100">
                                                            <div className="font-bold text-purple-900 mb-1">其他法令案件</div>
                                                            <p className="text-sm text-slate-700 mt-2 leading-relaxed">
                                                                民投金額超過 <strong>1,000 萬元</strong>者，依上述計算方式後以 <Badge color="purple">5% 發給</Badge>，且當年度總額以 <strong className="text-purple-700">500 萬元</strong>為上限。
                                                            </p>
                                                        </div>
                                                    </div>

                                                    {/* 扣減與不予核發 */}
                                                    <div className="space-y-4">
                                                        <div className="bg-amber-50 rounded-lg p-4 border border-amber-200">
                                                            <div className="font-bold text-amber-900 flex items-center mb-2">
                                                                <ArrowDownCircle className="w-5 h-5 mr-2 text-amber-600" />
                                                                酌減 30% 之情形
                                                            </div>
                                                            <ul className="list-disc list-inside text-sm text-amber-800 space-y-1 marker:text-amber-500">
                                                                <li>未依限完成基本資訊登載</li>
                                                                <li>未依限完成函報財政部辦理民投金額認定</li>
                                                            </ul>
                                                        </div>

                                                        <div className="bg-red-50 rounded-lg p-4 border border-red-200">
                                                            <div className="font-bold text-red-900 flex items-center mb-2">
                                                                <XCircle className="w-5 h-5 mr-2 text-red-600" />
                                                                不予核發之情形
                                                            </div>
                                                            <ul className="space-y-2 text-sm text-red-800">
                                                                <li className="flex items-start">
                                                                    <span className="mr-2 mt-0.5">•</span>
                                                                    <span>契約期間未滿 5 年。</span>
                                                                </li>
                                                                <li className="flex items-start">
                                                                    <span className="mr-2 mt-0.5">•</span>
                                                                    <span>優先定約案件<br/><span className="text-xs text-red-600/80">(例外：經認定為重大公共建設範圍，或該案未曾獲發簽約獎勵金者除外)</span></span>
                                                                </li>
                                                                <li className="flex items-start">
                                                                    <span className="mr-2 mt-0.5">•</span>
                                                                    <span>同一民參案件已核發過簽約獎勵金<br/><span className="text-xs text-red-600/80">(例外：依第 15 點規定將獎勵金繳回國庫之案件除外)</span></span>
                                                                </li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                                {/* 2. 重點公共建設獎勵金 */}
                                                <div className="border border-emerald-200 bg-emerald-50/30 rounded-lg p-5">
                                                    <h3 className="text-emerald-800 font-bold flex items-center mb-2">
                                                        <span className="bg-emerald-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2 shrink-0">2</span>
                                                        重點公共建設獎勵金 (§11)
                                                    </h3>
                                                    <p className="text-sm text-slate-700 mt-3 leading-relaxed">
                                                        經財政部認屬<strong>「重點公共建設」之促參案件</strong>，於當年度 <Badge color="amber">12 月 31 日前</Badge> 完成簽約者，每案得加發 <strong className="text-emerald-700 text-lg mx-1">25 萬元</strong>，於次年度撥付。
                                                    </p>
                                                </div>

                                                {/* 3. 考核獎勵金 */}
                                                <div className="border border-indigo-200 bg-indigo-50/30 rounded-lg p-5">
                                                    <h3 className="text-indigo-800 font-bold flex items-center mb-2">
                                                        <span className="bg-indigo-600 text-white w-6 h-6 rounded-full inline-flex items-center justify-center text-sm mr-2 shrink-0">3</span>
                                                        考核獎勵金 (§12)
                                                    </h3>
                                                    <p className="text-sm text-slate-700 mt-3 leading-relaxed">
                                                        財政部依當年度考核計畫，針對<strong className="text-indigo-700 mx-1">「地方政府」</strong>辦理促參案件經評定成績優良者核定之獎勵金，於次年度撥付。
                                                    </p>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>

                                    <Card title="二、 相關規定與行政作業" icon={FileText} className="mb-0">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            {/* 1. 發放上限與罰則 & 2. 優先核發順位 */}
                                            <div className="space-y-6">
                                                <div className="bg-slate-50 border border-slate-200 rounded-lg overflow-hidden">
                                                    <div className="bg-slate-200 px-4 py-2 font-bold text-slate-800 text-sm">
                                                        機關獎勵金上限與優先順位 (§11~§14)
                                                    </div>
                                                    <div className="p-4 space-y-4">
                                                        <div className="border-l-4 border-blue-500 pl-3">
                                                            <div className="font-bold text-blue-900 text-sm">中央目的事業主管機關</div>
                                                            <ul className="text-sm text-slate-600 mt-1 space-y-1">
                                                                <li>• <strong>上限：</strong>當年度總計 <Badge color="red">500 萬元為限</Badge></li>
                                                                <li>• <strong>優先順位：</strong>重點公共建設獎勵金</li>
                                                                <li className="text-xs text-slate-500 mt-1">※ 若預算不足，簽約獎勵金由財政部按比例調整。</li>
                                                            </ul>
                                                        </div>
                                                        <div className="border-l-4 border-emerald-500 pl-3">
                                                            <div className="font-bold text-emerald-900 text-sm">地方政府</div>
                                                            <ul className="text-sm text-slate-600 mt-1 space-y-1">
                                                                <li>• <strong>上限：</strong><Badge color="emerald">無上限</Badge></li>
                                                                <li>• <strong>優先順位：</strong>重點公共建設獎勵金、考核獎勵金</li>
                                                                <li className="text-xs text-slate-500 mt-1">※ 若預算不足，簽約獎勵金同樣由財政部按比例調整。</li>
                                                            </ul>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-red-50 border border-red-200 rounded-lg p-4 flex items-start">
                                                    <AlertTriangle className="w-5 h-5 text-red-500 mr-3 shrink-0 mt-0.5" />
                                                    <div>
                                                        <div className="font-bold text-red-900 text-sm">違規減列 (§14)</div>
                                                        <p className="text-sm text-red-800 mt-1">
                                                            經財政部抽核發現有違反「專款專用」規定者，該機關當年度簽約獎勵金總額 <strong className="bg-red-200 px-1 rounded">減列 5%</strong>。
                                                        </p>
                                                    </div>
                                                </div>
                                            </div>

                                            {/* 3. 繳回機制 & 4. 分配與用途 */}
                                            <div className="space-y-6">
                                                <div className="bg-amber-50/50 border border-amber-200 rounded-lg p-4">
                                                    <h4 className="font-bold text-amber-900 text-sm mb-3 border-b border-amber-200 pb-2">獎勵金繳回機制 (§15)</h4>
                                                    <div className="space-y-3">
                                                        <div className="bg-white p-3 rounded border border-amber-100 shadow-sm text-sm">
                                                            <strong className="text-amber-800 block mb-1">繳回條件：</strong>
                                                            <p className="text-slate-700">民參案件自簽約日起算 <Badge color="red">3 年內</Badge> 終止或解除投資契約者，機關應於次日起 <strong className="text-amber-700">30 日內</strong>通知財政部，並將獎勵金繳回國庫。</p>
                                                        </div>
                                                        <div className="bg-white p-3 rounded border border-amber-100 shadow-sm text-sm">
                                                            <strong className="text-amber-800 block mb-1">繳回金額計算：</strong>
                                                            <p className="text-slate-700">應按財政部核算之個案核列數繳回，但<strong className="text-emerald-700">得扣除已核發之個人獎金</strong>。</p>
                                                            <p className="text-xs text-slate-500 mt-1">※ 財政部不會重行核算該機關該年度的總獎勵金。</p>
                                                        </div>
                                                    </div>
                                                </div>

                                                <div className="bg-blue-50/50 border border-blue-200 rounded-lg p-4">
                                                    <h4 className="font-bold text-blue-900 text-sm mb-3 border-b border-blue-200 pb-2">獎勵金分配與用途 (§16~§19)</h4>
                                                    <ul className="space-y-3 text-sm text-slate-700">
                                                        <li className="flex items-start">
                                                            <Globe className="w-4 h-4 text-blue-500 mr-2 shrink-0 mt-0.5" />
                                                            <div>
                                                                <strong className="block text-blue-800">分配協商：</strong>
                                                                民參案件由 2 個(含)以上之機關主辦時，獎勵金由各機關共同協議分配；若協議不成，交由財政部協調。
                                                            </div>
                                                        </li>
                                                        <li className="flex items-start">
                                                            <FileCheck className="w-4 h-4 text-blue-500 mr-2 shrink-0 mt-0.5" />
                                                            <div>
                                                                <strong className="block text-blue-800">用途規範：</strong>
                                                                依據第 17 點運用範圍，以及第 18、19 點的機關發給規定辦理。
                                                            </div>
                                                        </li>
                                                    </ul>
                                                </div>
                                            </div>
                                        </div>
                                    </Card>
                                </div>
                            )}

                        </div>
                    </div>
                </div>
            );
        };

        // 渲染應用程式
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
